{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Netflix Clone{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'assets/style.css' %}">
</head>

<body class="app-page">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg custom-navbar px-4 py-3">

    <!-- LOGO -->
   <a href="{% url 'app:index' %}" class="navbar-brand netflix-logo">
    NETFLIX
</a>

    <!-- SEARCH -->
    <form class="d-flex ms-3" action="{% url 'app:search' %}" method="GET">
        <input class="form-control form-control-sm me-2"
               type="text"
               name="q"
               placeholder="Search movies...">
        <button class="btn btn-danger btn-sm">Search</button>
    </form>

    <!-- RIGHT MENU -->
    <div class="ms-auto d-flex gap-3 align-items-center">

        <a class="nav-link" href="{% url 'app:index' %}">Home</a>
        <a class="nav-link" href="{% url 'app:my_list' %}">My List</a>

        {% if user.is_authenticated %}
            <a class="nav-link" href="{% url 'app:logout' %}">Logout</a>
        {% else %}
            <a class="nav-link" href="{% url 'app:login' %}">Login</a>
            <a class="nav-link" href="{% url 'app:signup' %}">Signup</a>
        {% endif %}

    </div>
</nav>

<div class="container-fluid px-4 mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
